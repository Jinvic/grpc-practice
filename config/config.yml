environment: dev
database:
  file: ./data/bookstore.db
  max_open_conns: 1
  max_idle_conns: 1
  conn_max_lifetime: 5m
logging:
  level: debug
  format: json
  output: file
  add_source: false
  max_size: 100
  max_age: 7
  max_backups: 10
  compress: false
  local_time: false
services:
  book:
    name: book_service
    version: 1.0.0
    host: localhost
    port: 8081
    log_file: ./logs/book_service.log
    http_port: 9091
    enable_http: true
otel:
  otel_endpoint: localhost:4317
  trace_sample_rate: 0.1
  batch_timeout: 5s
  export_timeout: 10s
  export_interval: 60s
  insecure: true